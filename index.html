<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Task Journal</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f0f0f5;
    }

    /* Modern Neon Glow Heading */
    .main-heading {
      font-size: 3.5em;
      text-align: center;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      text-shadow: 
        0 0 5px #00e6e6,
        0 0 10px #00cccc,
        0 0 20px #009999,
        0 0 40px #006666;
      background: #111;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    h2 {
      font-size: 2em;
      margin-top: 30px;
      text-shadow: 1px 1px 3px #aaa;
    }

    /* Input box style */
    #taskInput {
      width: 60%;
      padding: 12px;
      margin-right: 10px;
      font-size: 1em;
      border: 2px solid #4CAF50;
      border-radius: 8px;
      outline: none;
      transition: all 0.3s ease;
    }

    #taskInput:focus {
      border-color: #2196f3;
      box-shadow: 0 0 10px #2196f3;
    }

    /* Add Task button style */
    #addBtn {
      padding: 12px 20px;
      border: none;
      cursor: pointer;
      background: linear-gradient(45deg, #4CAF50, #81C784);
      color: white;
      font-size: 1em;
      font-weight: bold;
      border-radius: 8px;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    #addBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #4CAF50;
    }

    #addBtn:active {
      transform: scale(0.95);
    }

    ul {
      list-style-type: none;
      padding: 0;
    }

    li {
      margin: 8px 0;
      padding: 12px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      font-size: 1.1em;
      transition: transform 0.2s;
    }

    li:hover {
      transform: scale(1.02);
    }

    /* Pending Task Style */
    #taskList li {
      background: #fff8e1;
      border-left: 6px solid #ff9800;
      font-family: 'Trebuchet MS', sans-serif;
    }

    /* Completed Task Style */
    #completedList li {
      background: #e0f7fa;
      border-left: 6px solid #009688;
      font-family: 'Courier New', monospace;
      text-decoration: line-through;
      color: #555;
    }

    /* History Style */
    #historyList li {
      background: #f3e5f5;
      border-left: 6px solid #9c27b0;
      font-size: 0.95em;
      color: #333;
    }

    .meta {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    .deleteBtn {
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
      margin-top: 5px;
      border-radius: 4px;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    .deleteBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px red;
    }

    .deleteBtn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <h1 class="main-heading">📝 Daily Task Journal</h1>
  <input type="text" id="taskInput" placeholder="Enter a new task...">
  <button id="addBtn">Add Task</button>
  
  <h2>Pending Tasks</h2>
  <ul id="taskList"></ul>

  <h2>Completed Tasks</h2>
  <ul id="completedList"></ul>

  <h2>Task History</h2>
  <ul id="historyList"></ul>

  <script>
    const addBtn = document.getElementById("addBtn");
    const taskInput = document.getElementById("taskInput");
    const taskList = document.getElementById("taskList");
    const completedList = document.getElementById("completedList");
    const historyList = document.getElementById("historyList");

    // Load tasks and history from localStorage
    window.onload = () => {
      const savedTasks = JSON.parse(localStorage.getItem("tasks")) || [];
      savedTasks.forEach(task => createTaskElement(task.text, task.done, task.createdAt, task.completedAt));

      const savedHistory = JSON.parse(localStorage.getItem("history")) || [];
      savedHistory.forEach(entry => addHistory(entry, false));
    };

    function saveTasks() {
      const tasks = [];
      document.querySelectorAll("#taskList li").forEach(li => {
        tasks.push({
          text: li.querySelector(".text").textContent,
          done: false,
          createdAt: li.querySelector(".created").textContent.replace("Created: ", ""),
          completedAt: null
        });
      });
      document.querySelectorAll("#completedList li").forEach(li => {
        tasks.push({
          text: li.querySelector(".text").textContent,
          done: true,
          createdAt: li.querySelector(".created").textContent.replace("Created: ", ""),
          completedAt: li.querySelector(".completed").textContent.replace("Completed: ", "")
        });
      });
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function addHistory(actionText, save = true) {
      const li = document.createElement("li");
      li.textContent = actionText;
      historyList.appendChild(li);

      if (save) {
        const savedHistory = JSON.parse(localStorage.getItem("history")) || [];
        savedHistory.push(actionText);
        localStorage.setItem("history", JSON.stringify(savedHistory));
      }
    }

    function createTaskElement(taskText, done = false, createdAt = null, completedAt = null) {
      const li = document.createElement("li");

      const textSpan = document.createElement("span");
      textSpan.className = "text";
      textSpan.textContent = taskText;
      li.appendChild(textSpan);

      const createdSpan = document.createElement("span");
      createdSpan.className = "meta created";
      createdSpan.textContent = "Created: " + (createdAt || new Date().toLocaleString());
      li.appendChild(createdSpan);

      if (done) {
        const completedSpan = document.createElement("span");
        completedSpan.className = "meta completed";
        completedSpan.textContent = "Completed: " + (completedAt || new Date().toLocaleString());
        li.appendChild(completedSpan);
        completedList.appendChild(li);
      } else {
        li.addEventListener("click", () => {
          taskList.removeChild(li);
          const completedSpan = document.createElement("span");
          completedSpan.className = "meta completed";
          completedSpan.textContent = "Completed: " + new Date().toLocaleString();
          li.appendChild(completedSpan);
          completedList.appendChild(li);
          addHistory(`✔ Completed task: "${taskText}" at ${new Date().toLocaleString()}`);
          saveTasks();
        });
        taskList.appendChild(li);
      }

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Delete";
      deleteBtn.className = "deleteBtn";
      deleteBtn.addEventListener("click", () => {
        li.parentNode.removeChild(li);
        addHistory(`❌ Deleted task: "${taskText}" at ${new Date().toLocaleString()}`);
        saveTasks();
      });
      li.appendChild(deleteBtn);

      if (!createdAt) {
        addHistory(`➕ Added task: "${taskText}" at ${new Date().toLocaleString()}`);
      }
    }

    addBtn.addEventListener("click", () => {
      const taskText = taskInput.value.trim();
      if (taskText === "") return;
      createTaskElement(taskText);
      saveTasks();
      taskInput.value = "";
    });
  </script>
</body>
</html>
